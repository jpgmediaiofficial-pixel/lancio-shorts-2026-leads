<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#16181d;color:#fff;min-height:100vh;display:grid;place-items:center;padding:20px}
.card{background:#1f2228;border:1px solid #33373f;border-radius:20px;padding:38px 30px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}

input:focus{border-color:#C81E1E}
button{width:100%;margin-top:12px;background:#C81E1E;color:#fff;border:0;border-radius:11px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
button:hover{background:#9B1414}
.err{color:#f87171;font-size:13px;margin-top:14px;min-height:18px}
.brand{margin-top:20px;color:#6b7280;font-size:12px}
</style></head>

function b2b(b){const s=atob(b);const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
async function unlock(){
  const pass=document.getElementById('pw').value;const err=document.getElementById('err');err.textContent='';
  try{
    const raw=b2b(PAYLOAD);const salt=raw.slice(0,16),iv=raw.slice(16,28),data=raw.slice(28);
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
    document.open();document.write(new TextDecoder().decode(pt));document.close();
  }catch(e){err.textContent='Password errata.';}
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
