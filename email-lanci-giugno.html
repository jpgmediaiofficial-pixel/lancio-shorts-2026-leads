async function unlock(){
  const pw=document.getElementById('pw').value;const err=document.getElementById('err');err.textContent="";
  try{
    const enc=new TextEncoder();
    const baseKey=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:100000,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);

    document.open();document.write(html);document.close();
  }catch(e){err.textContent="Password errata.";}
